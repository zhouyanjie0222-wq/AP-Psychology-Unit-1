<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AP 心理 Unit 1 抽查</title>
    <meta name="description" content="AP Psychology Unit 1 Biological Bases of Behavior 抽查小网页：点击抽术语，再点显示英文+中文解释。" />
    <style>
      :root{
        /* 复古苹果像素风基础色 */
        --bg:#d8d8d8;
        --panel:#f5f5f5;
        --panel2:#e9e9e9;
        --text:#111111;
        --muted:#555555;
        --accent:#007aff;
        --accent2:#0051c9;
        --danger:#d7263d;
        --shadow:#00000055;
      }
      *{ box-sizing:border-box; }
      html,body{ height:100%; }
      body{
        margin:0;
        background:
          repeating-linear-gradient(45deg, #d0d0d0 0 2px, #d8d8d8 2px 4px);
        color:var(--text);
        font-family: "SF Mono","Menlo","Monaco",ui-monospace,monospace;
        letter-spacing: .2px;
      }

      .wrap{
        min-height:100%;
        display:flex;
        align-items:center;
        justify-content:center;
        padding:24px;
      }

      .card{
        width:min(920px, 100%);
        background: var(--panel);
        border-radius: 0;
        box-shadow:
          0 0 0 2px #000,
          0 0 0 4px #b0b0b0,
          8px 8px 0 0 #00000066;
        padding: 0;
        border: none;
        position:relative;
      }

      /* 顶部像老苹果窗口的标题栏 */
      .card::before{
        content:"";
        display:block;
        height: 24px;
        background: linear-gradient(180deg,#e3e3e3,#cfcfcf);
        border-bottom: 2px solid #000;
      }

      .top{
        display:flex;
        gap:14px;
        align-items:flex-start;
        justify-content:space-between;
        flex-wrap:wrap;
        margin: 10px 18px 8px;
      }
      .title{
        display:flex;
        flex-direction:column;
        gap:4px;
        min-width: 260px;
      }
      .title h1{
        margin:0;
        font-size: 18px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: .5px;
      }
      .title .sub{
        color:var(--muted);
        font-size:12px;
        line-height:1.4;
      }
      .pillrow{
        display:flex;
        gap:10px;
        flex-wrap:wrap;
        align-items:center;
        justify-content:flex-end;
      }
      .pill{
        font-size: 12px;
        color: var(--muted);
        background: #f0f0f0;
        border: 2px solid #000;
        padding: 8px 10px;
        border-radius: 0;
        box-shadow: 2px 2px 0 #00000055;
      }
      .pill b{ color: var(--text); }

      .machine{
        display:grid;
        grid-template-columns: 1.2fr .8fr;
        gap: 18px;
        align-items:stretch;
        padding: 0 18px 18px;
      }
      @media (max-width: 860px){
        .machine{ grid-template-columns: 1fr; }
      }

      .screen{
        padding: 18px;
        background: #ffffff;
        border-radius: 0;
        border: 2px solid #000;
        box-shadow: 4px 4px 0 #00000055;
        position:relative;
        overflow:hidden;
      }
      .screen:before{
        content:"";
        position:absolute;
        inset:-30px;
        background:
          repeating-linear-gradient(180deg, #f5f5f5 0 2px, transparent 2px 4px),
          radial-gradient(900px 420px at 20% 0%, #c7d2fe88 0%, transparent 60%);
        opacity:.8;
        pointer-events:none;
        transform: rotate(-1.5deg);
      }

      .screen-inner{
        position:relative;
        z-index:1;
        display:flex;
        flex-direction:column;
        gap:12px;
        min-height: 280px;
      }

      .badge{
        display:flex;
        gap:8px;
        flex-wrap:wrap;
        align-items:center;
      }
      .tag{
        font-size: 11px;
        padding: 6px 8px;
        border: 2px solid #000;
        background: #e9e9e9;
        color: var(--muted);
        border-radius: 10px;
      }
      .tag strong{ color: var(--text); }

      .term{
        font-size: 26px;
        font-weight: 900;
        line-height: 1.15;
        margin-top: 6px;
      }
      .term small{
        display:block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        margin-top: 8px;
      }
      .def{
        white-space: pre-wrap;
        line-height: 1.6;
        font-size: 13px;
        color: #1f2933;
        border-left: 3px solid #000000;
        padding-left: 10px;
        background:
          repeating-linear-gradient(135deg,#ffffff 0 3px,#f4f4f4 3px 6px);
        border-radius: 0;
        padding-top: 8px;
        padding-bottom: 8px;
      }
      .hint{
        margin-top:auto;
        color: var(--muted);
        font-size: 12px;
        display:flex;
        gap:10px;
        flex-wrap:wrap;
        align-items:center;
      }
      .kbd{
        padding: 2px 6px;
        border-radius: 0;
        border: 1px solid #000;
        background: #f5f5f5;
        color: #111111;
        font-size: 11px;
      }

      .controls{
        padding: 18px;
        background: #e9e9e9;
        border-radius: 0;
        border: 2px solid #000;
        display:flex;
        flex-direction:column;
        gap: 12px;
        box-shadow: 4px 4px 0 #00000055;
      }

      .btn{
        border: none;
        padding: 14px 14px;
        border-radius: 0;
        background: #f5f5f5;
        color: #000;
        font-weight: 900;
        cursor:pointer;
        box-shadow:
          0 0 0 2px #000,
          3px 3px 0 #00000055;
        position:relative;
        transform: translateY(0);
      }
      .btn:active{ transform: translateY(1px); }
      .btn.secondary{
        background: #f0f0f0;
        border: 2px solid #000;
        color: #111111;
        box-shadow:
          0 0 0 2px #000,
          3px 3px 0 #00000055;
      }
      .btn.danger{
        background: #ffe4e8;
      }
      .btn:disabled{
        opacity:.65;
        cursor:not-allowed;
      }

      .row{
        display:flex;
        gap:10px;
        flex-wrap:wrap;
      }
      .row .btn{ flex: 1 1 140px; }

      .stat{
        display:grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 2px;
      }
      .box{
        background:#f5f5f5;
        border: 2px solid #000;
        border-radius: 0;
        padding: 10px;
      }
      .box .k{ color: var(--muted); font-size: 11px; }
      .box .v{ font-size: 14px; font-weight: 900; margin-top:6px; }

      .footer{
        margin-top: 14px;
        color: var(--muted);
        font-size: 11px;
        line-height:1.5;
      }
      a{ color: var(--accent2); text-decoration:none; }
      a:hover{ text-decoration:underline; }

      .spark{
        display:inline-block;
        width: 10px;
        height: 10px;
        background: var(--accent);
        margin-right: 8px;
        box-shadow:
          0 0 0 2px #ffffff,
          0 0 0 4px #000;
      }
      .roll{
        animation: roll 80ms steps(1) infinite;
      }
      @keyframes roll{
        0%{ filter: blur(0px); opacity: 1; }
        50%{ filter: blur(1px); opacity: .85; }
        100%{ filter: blur(0px); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <main class="card" role="main">
        <div class="top">
          <div class="title">
            <h1><span class="spark"></span>AP 心理 Unit 1 抽查</h1>
            <div class="sub">点击一次随机抽取术语；再点一次显示解释；继续点击进入下一题。支持键盘 <span class="kbd">Space</span>/<span class="kbd">Enter</span>。</div>
          </div>
          <div class="pillrow">
            <div class="pill">题库：<b id="totalCount">-</b> 个术语</div>
            <div class="pill">未重复池：<b id="poolCount">-</b></div>
            <div class="pill">模式：<b id="modeLabel">抽术语</b></div>
          </div>
        </div>

        <section class="machine" aria-label="抽查机器">
          <div class="screen" aria-live="polite">
            <div class="screen-inner">
              <div class="badge">
                <div class="tag">Unit 1 <strong>Biological Bases</strong></div>
                <div class="tag">当前：<strong id="topicLabel">-</strong></div>
              </div>

              <div class="term" id="termText">准备好了就点击右侧按钮</div>
              <div class="def" id="defText" style="display:none;"></div>

              <div class="hint" id="hintText">
                <span>提示：你也可以直接点屏幕抽取。</span>
              </div>
            </div>
          </div>

          <aside class="controls" aria-label="操作区">
            <button class="btn" id="mainBtn">点击抽取术语</button>
            <div class="row">
              <button class="btn secondary" id="toggleNoRepeatBtn">未重复池：开启</button>
              <button class="btn secondary" id="shuffleBtn">重新洗牌</button>
            </div>
            <div class="row">
              <button class="btn secondary" id="peekBtn">偷看解释</button>
              <button class="btn danger" id="resetBtn">重置计数</button>
            </div>

            <div class="stat">
              <div class="box">
                <div class="k">已抽题数</div>
                <div class="v" id="drawnCount">0</div>
              </div>
              <div class="box">
                <div class="k">已看解释数</div>
                <div class="v" id="revealedCount">0</div>
              </div>
            </div>

            <div class="footer">
              说明：题库术语来自你提供的 `Unit1-Biological.pdf` 的 vocab 列表；解释按 AP Psych 常见定义整理，便于课堂抽查。
            </div>
          </aside>
        </section>
      </main>
    </div>

    <script>
      /**
       * 题库（术语来自 PDF 提取；解释为 AP Psych 常用定义/课堂口径）
       * topic 仅用于在界面上分组提示，不影响抽取。
       */
      const TERMS = [
        // 1.1
        {
          term: "evolutionary perspective",
          topic: "1.1 遗传与环境",
          defEn: "An approach that explains behavior and mental processes in terms of how they helped our ancestors survive and reproduce, using ideas such as natural selection.",
          defZh: "进化视角：用自然选择等进化机制解释行为与心理特征如何帮助生存与繁殖，从而在群体中被保留下来。"
        },
        {
          term: "natural selection",
          topic: "1.1 遗传与环境",
          defEn: "The principle that inherited traits that better enable survival and reproduction are more likely to be passed on to succeeding generations.",
          defZh: "自然选择：能提高生存/繁殖成功的遗传变异更可能被传递到下一代，导致这些特征在群体中更常见。"
        },
        {
          term: "eugenics",
          topic: "1.1 遗传与环境",
          defEn: "A movement that sought to improve the human gene pool through selective breeding and other means, often leading to unethical practices and discrimination.",
          defZh: "优生学：试图通过“选择性繁殖”等方式‘改善’人类基因的运动；历史上与歧视、强制绝育等严重伦理问题相关。"
        },
        {
          term: "twin studies",
          topic: "1.1 遗传与环境",
          defEn: "Research that compares identical and fraternal twins to estimate the relative influence of genes and environment on traits.",
          defZh: "双生子研究：比较同卵/异卵双胞胎（有时含分开抚养）在特质上的相似性，用于估计遗传与环境对行为差异的影响。"
        },

        // 1.2
        {
          term: "central nervous system (CNS)",
          topic: "1.2 神经系统概览",
          defEn: "The brain and spinal cord; the body's decision-making and information-processing center.",
          defZh: "中枢神经系统：由大脑和脊髓组成，负责信息整合、决策与指令发出。"
        },
        {
          term: "peripheral nervous system (PNS)",
          topic: "1.2 神经系统概览",
          defEn: "All the nerves outside the brain and spinal cord that connect the CNS to the rest of the body.",
          defZh: "周围神经系统：中枢以外的所有神经与神经节，把感觉信息送入中枢并把运动指令送到身体各部位。"
        },
        {
          term: "autonomic nervous system (ANS)",
          topic: "1.2 神经系统概览",
          defEn: "The division of the PNS that controls glands and the muscles of internal organs, usually operating automatically.",
          defZh: "自主神经系统：周围神经系统的一部分，自动调控内脏活动（心跳、消化、腺体分泌等），通常不受意识直接控制。"
        },
        {
          term: "somatic nervous system",
          topic: "1.2 神经系统概览",
          defEn: "The division of the PNS that controls voluntary movements of skeletal muscles and carries sensory information.",
          defZh: "躯体神经系统：周围神经系统的一部分，控制骨骼肌的随意运动，并传递来自皮肤、肌肉和关节的感觉信息。"
        },
        {
          term: "sympathetic nervous system",
          topic: "1.2 神经系统概览",
          defEn: "The division of the ANS that arouses the body for action—mobilizing energy in stressful situations (fight-or-flight).",
          defZh: "交感神经系统：自主神经系统的分支，使身体进入“战或逃”状态（心率上升、瞳孔扩大、消化抑制等）。"
        },
        {
          term: "parasympathetic nervous system",
          topic: "1.2 神经系统概览",
          defEn: "The division of the ANS that calms the body, conserving energy and supporting rest-and-digest functions.",
          defZh: "副交感神经系统：自主神经系统的分支，使身体恢复“休息与消化”状态（心率降低、促进消化与能量储存）。"
        },

        // 1.3
        {
          term: "neuron",
          topic: "1.3 神经元与放电",
          defEn: "A nerve cell; the basic building block of the nervous system that communicates using electrical and chemical signals.",
          defZh: "神经元：神经系统的基本信息处理单元，通过电信号（动作电位）和化学信号（神经递质）进行通信。"
        },
        {
          term: "glial cells",
          topic: "1.3 神经元与放电",
          defEn: "Cells in the nervous system that support, nourish, and protect neurons, and may also help with information processing.",
          defZh: "神经胶质细胞：为神经元提供支持、营养、保护与髓鞘形成等功能，也参与免疫与信息调节。"
        },
        {
          term: "reflex arc",
          topic: "1.3 神经元与放电",
          defEn: "A simple, automatic response pathway that bypasses most of the brain, involving sensory neuron, interneuron, and motor neuron.",
          defZh: "反射弧：无需大脑参与或只需最少参与的快速反射通路（感觉神经元→脊髓/中间神经元→运动神经元）。"
        },
        {
          term: "sensory neurons (afferent)",
          topic: "1.3 神经元与放电",
          defEn: "Neurons that carry incoming information from sensory receptors to the brain and spinal cord.",
          defZh: "感觉神经元（传入）：把来自感觉受体的信息传到中枢神经系统。"
        },
        {
          term: "motor neurons (efferent)",
          topic: "1.3 神经元与放电",
          defEn: "Neurons that carry outgoing information from the brain and spinal cord to muscles and glands.",
          defZh: "运动神经元（传出）：把中枢发出的指令传到肌肉或腺体，引发动作/分泌。"
        },
        {
          term: "interneurons",
          topic: "1.3 神经元与放电",
          defEn: "Neurons within the brain and spinal cord that communicate internally and process information between sensory input and motor output.",
          defZh: "中间神经元：主要位于中枢内，连接感觉与运动神经元，负责整合与加工信息。"
        },
        {
          term: "all-or-nothing principle",
          topic: "1.3 神经元与放电",
          defEn: "The idea that a neuron either fires a full-strength action potential or does not fire at all.",
          defZh: "全或无定律：动作电位一旦达到阈值就会以固定幅度发生；刺激强度主要通过放电频率而不是单次幅度来编码。"
        },
        {
          term: "action potential",
          topic: "1.3 神经元与放电",
          defEn: "A brief electrical charge that travels down an axon when the neuron fires.",
          defZh: "动作电位：神经元膜电位快速变化的电冲动，沿轴突传播，实现长距离信号传递。"
        },
        {
          term: "depolarization",
          topic: "1.3 神经元与放电",
          defEn: "A change in a neuron's membrane potential making the inside less negative, often triggering an action potential.",
          defZh: "去极化：膜电位变得不那么负（更接近 0 或变正），常由 Na⁺ 内流引起，是动作电位的关键阶段。"
        },
        {
          term: "refractory period",
          topic: "1.3 神经元与放电",
          defEn: "A brief resting pause after a neuron fires during which another action potential cannot be generated.",
          defZh: "不应期：动作电位后短时间内神经元难以或不能再次放电，限制最高放电频率并保证信号单向传播。"
        },
        {
          term: "resting potential",
          topic: "1.3 神经元与放电",
          defEn: "The stable, negative charge of a neuron when it is not firing, typically around -70 millivolts.",
          defZh: "静息电位：神经元未放电时膜内相对膜外为负的电位差（约 -70mV），由离子分布与膜通透性维持。"
        },
        {
          term: "reuptake",
          topic: "1.3 神经元与放电",
          defEn: "A process in which neurotransmitters are taken back into the sending neuron, ending their action in the synapse.",
          defZh: "再摄取：突触间隙中的神经递质被突触前神经元重新吸收回收，用于终止信号或再利用。"
        },
        {
          term: "threshold",
          topic: "1.3 神经元与放电",
          defEn: "The level of stimulation required to trigger a neural impulse.",
          defZh: "阈值：引发动作电位所需的最小去极化水平；未达阈值则不会产生动作电位。"
        },
        {
          term: "multiple sclerosis (MS)",
          topic: "1.3 神经元与放电",
          defEn: "A disease in which the immune system attacks the myelin sheath, slowing or blocking neural communication.",
          defZh: "多发性硬化：免疫系统攻击中枢髓鞘导致脱髓鞘，神经传导受损，出现运动/感觉/认知等多种症状。"
        },
        {
          term: "myasthenia gravis",
          topic: "1.3 神经元与放电",
          defEn: "An autoimmune disorder that reduces acetylcholine receptors at the neuromuscular junction, leading to muscle weakness.",
          defZh: "重症肌无力：自身免疫破坏神经肌肉接头的乙酰胆碱受体，导致肌无力、易疲劳等。"
        },
        {
          term: "excitatory neurotransmitter",
          topic: "1.3 神经元与放电",
          defEn: "A chemical messenger that makes the receiving neuron more likely to fire.",
          defZh: "兴奋性神经递质：使突触后膜更可能达到阈值（产生 EPSP），增加放电概率。"
        },
        {
          term: "inhibitory neurotransmitter",
          topic: "1.3 神经元与放电",
          defEn: "A chemical messenger that makes the receiving neuron less likely to fire.",
          defZh: "抑制性神经递质：使突触后膜更不易达到阈值（产生 IPSP），降低放电概率。"
        },
        {
          term: "dopamine",
          topic: "1.3 神经元与放电",
          defEn: "A neurotransmitter involved in movement, learning, attention, and reward; imbalances are linked to Parkinson's disease and schizophrenia.",
          defZh: "多巴胺：与奖赏、动机、运动控制相关；过多/通路异常与精神分裂症症状有关，过少与帕金森样运动困难相关。"
        },
        {
          term: "serotonin",
          topic: "1.3 神经元与放电",
          defEn: "A neurotransmitter that affects mood, hunger, sleep, and arousal; low levels are associated with depression.",
          defZh: "血清素：与情绪、睡眠、食欲等相关；水平失衡与抑郁等情绪问题有关（SSRIs 通过影响再摄取起效）。"
        },
        {
          term: "norepinephrine",
          topic: "1.3 神经元与放电",
          defEn: "A neurotransmitter and hormone involved in alertness and arousal, especially in times of stress.",
          defZh: "去甲肾上腺素：与警觉、注意、唤醒与压力反应相关；失衡可与焦虑或情绪障碍有关。"
        },
        {
          term: "glutamate",
          topic: "1.3 神经元与放电",
          defEn: "A major excitatory neurotransmitter involved in memory; excess glutamate can overstimulate the brain.",
          defZh: "谷氨酸：主要的兴奋性神经递质，参与学习与记忆；过量可导致兴奋性毒性与神经损伤。"
        },
        {
          term: "GABA",
          topic: "1.3 神经元与放电",
          defEn: "The main inhibitory neurotransmitter in the brain; low levels are linked to anxiety and seizures.",
          defZh: "γ-氨基丁酸（GABA）：主要的抑制性神经递质；不足与焦虑、癫痫等有关（部分镇静药物增强 GABA 作用）。"
        },
        {
          term: "substance P",
          topic: "1.3 神经元与放电",
          defEn: "A neurotransmitter involved in the transmission of pain messages in the nervous system.",
          defZh: "P 物质：与疼痛信息传递相关的神经递质/神经肽。"
        },
        {
          term: "endorphins",

        },
        {
          term: "absolute threshold",
          topic: "1.6 感觉与知觉",
          defEn: "The minimum stimulation needed to detect a particular stimulus 50 percent of the time.",

        },
        {

          defZh: "信号检测理论：检测取决于信号强度与噪音、以及观察者的标准/期望与动机（命中、虚报等）。"
        },
        {
          term: "difference threshold (JND)",

        {

        {

          defEn: "Retinal receptors that detect black, white, and gray and are sensitive to low light; used in peripheral and night vision.",

        },
        {

        {

        },
        {

          defEn: "Processing many aspects of a problem simultaneously; in vision, color, motion, form, and depth are processed at the same time.",

        },

        // hearing + pain + taste/smell + body senses (from PDF list)
        {

          defZh: "听觉：对声波的感觉与知觉处理。"
        },
        {
          term: "frequency",
          topic: "1.6 感觉与知觉",
          defEn: "The number of complete wavelengths that pass a point in a given time; in hearing, associated with pitch.",
          defZh: "频率：每秒波动次数；在听觉中与音调（pitch）相关。"
        },
        {
          term: "pitch",
          topic: "1.6 感觉与知觉",
          defEn: "A tone's experienced highness or lowness; depends on frequency.",
          defZh: "音调：声音高低的主观体验，主要由频率决定。"
        },
        {
          term: "middle ear",
          topic: "1.6 感觉与知觉",
          defEn: "The chamber between the eardrum and cochlea containing three tiny bones that concentrate vibrations.",
          defZh: "中耳：包含听小骨（锤骨、砧骨、镫骨），把鼓膜振动放大并传到内耳。"
        },
        {
          term: "cochlea",
          topic: "1.6 感觉与知觉",
          defEn: "A coiled, fluid-filled tube in the inner ear; sound waves trigger nerve impulses here.",
          defZh: "耳蜗：内耳的螺旋结构，内含毛细胞，把机械振动转化为神经信号。"
        },
        {
          term: "inner ear",
          topic: "1.6 感觉与知觉",
          defEn: "The innermost part of the ear, containing the cochlea and vestibular system.",
          defZh: "内耳：包含耳蜗与前庭系统，负责听觉换能与平衡。"
        },
        {
          term: "sensorineural hearing loss",
          topic: "1.6 感觉与知觉",
          defEn: "Hearing loss caused by damage to the cochlea's receptor cells or to the auditory nerves.",
          defZh: "感音神经性听力损失：内耳毛细胞或听神经受损导致（常与噪声、老化相关）。"
        },
        {
          term: "conduction hearing loss",
          topic: "1.6 感觉与知觉",
          defEn: "Hearing loss caused by damage to the mechanical system that conducts sound waves to the cochlea.",
          defZh: "传导性听力损失：外耳/中耳传导声波到内耳的过程受阻（如耳垢、鼓膜/听小骨问题）。"
        },
        {
          term: "place theory",
          topic: "1.6 感觉与知觉",
          defEn: "The theory that links the pitch we hear with the place where the cochlea's membrane is stimulated.",
          defZh: "位置理论：不同频率使耳蜗基底膜的不同位置最大振动，从而编码音调；对高频解释更好。"
        },
        {
          term: "frequency theory",
          topic: "1.6 感觉与知觉",
          defEn: "The theory that the rate of nerve impulses traveling up the auditory nerve matches the frequency of a tone.",
          defZh: "频率理论：听神经放电频率与声波频率匹配来编码音调；对低频解释更好（有锁相/群发放补充）。"
        },
        {
          term: "gate-control theory",
          topic: "1.6 感觉与知觉",
          defEn: "The theory that the spinal cord contains a 'gate' that controls the transmission of pain messages to the brain.",
          defZh: "门控理论：脊髓中的神经机制像“闸门”一样调节疼痛信号传入；注意、触摸与情绪可影响疼痛体验。"
        },
        {
          term: "gustation",
          topic: "1.6 感觉与知觉",
          defEn: "The sense of taste.",
          defZh: "味觉：对溶解在唾液中的化学物质的感觉与知觉。"
        },
        {
          term: "olfaction",
          topic: "1.6 感觉与知觉",
          defEn: "The sense of smell.",
          defZh: "嗅觉：对空气中化学分子的感觉与知觉；与记忆和情绪联系紧密。"
        },
        {
          term: "umami",
          topic: "1.6 感觉与知觉",
          defEn: "The savory taste of protein-rich foods, now recognized as a basic taste.",
          defZh: "鲜味：一种基本味觉，常与谷氨酸盐等有关（肉汤/蘑菇等“鲜”）。"
        },
        {
          term: "oleogustus",
          topic: "1.6 感觉与知觉",
          defEn: "A proposed basic taste quality associated with the flavor of fatty acids or oils.",
          defZh: "油脂味：近年提出的可能基本味觉之一，对脂肪酸/油脂相关刺激的味觉体验。"
        },
        {
          term: "pheromones",
          topic: "1.6 感觉与知觉",
          defEn: "Chemical signals released by an individual that can affect the behavior or physiology of others of the same species.",
          defZh: "信息素：个体释放、被同种个体接收并影响其行为/生理的化学信号；在人类中的作用证据较不一致。"
        },
        {
          term: "kinesthesis",
          topic: "1.6 感觉与知觉",
          defEn: "The system for sensing the position and movement of individual body parts.",
          defZh: "运动觉/本体感觉：来自肌肉、腱与关节的反馈，让我们知道身体各部位的位置与运动。"
        },
        {
          term: "vestibular sense",
          topic: "1.6 感觉与知觉",
          defEn: "The sense of body movement and position, including the sense of balance, based in the inner ear.",
          defZh: "前庭觉：内耳前庭系统提供的平衡与头部运动信息，帮助保持姿势与空间定向。"
        },
        {
          term: "phantom limb syndrome",
          topic: "1.6 感觉与知觉",
          defEn: "The sensation that a missing limb is still present, often accompanied by pain, after amputation.",
          defZh: "幻肢综合征：截肢后仍感觉到“失去的肢体”存在甚至疼痛，常与神经系统重组与疼痛通路有关。"
        },
      ];

      // ---------- App logic ----------
      const el = (id) => document.getElementById(id);
      const termText = el("termText");
      const defText = el("defText");
      const hintText = el("hintText");
      const topicLabel = el("topicLabel");
      const mainBtn = el("mainBtn");
      const toggleNoRepeatBtn = el("toggleNoRepeatBtn");
      const shuffleBtn = el("shuffleBtn");
      const peekBtn = el("peekBtn");
      const resetBtn = el("resetBtn");
      const totalCount = el("totalCount");
      const poolCount = el("poolCount");
      const modeLabel = el("modeLabel");
      const drawnCount = el("drawnCount");
      const revealedCount = el("revealedCount");

      totalCount.textContent = String(TERMS.length);

      let noRepeat = true;
      let pool = [];
      let current = null;
      let phase = "draw"; // draw -> reveal -> next(draw)
      let drawn = 0;
      let revealed = 0;
      let rolling = false;

      function shuffled(arr){
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--){
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function resetPool(){
        pool = shuffled(TERMS);
        poolCount.textContent = String(pool.length);
      }

      function setModeLabel(){
        modeLabel.textContent = phase === "draw" ? "抽术语" : (phase === "reveal" ? "看解释" : "下一题");
        mainBtn.textContent =
          phase === "draw" ? "点击抽取术语" :
          phase === "reveal" ? "再次点击显示解释" :
          "点击进入下一题";
      }

      function setScreen({term, topic, item, showDef}){
        termText.textContent = term || "准备好了就点击右侧按钮";
        topicLabel.textContent = topic || "-";
        if (showDef){
          defText.style.display = "block";
          if (item && (item.defEn || item.defZh)) {
            const en = item.defEn ? `EN: ${item.defEn}` : "";
            const zh = item.defZh ? `ZH: ${item.defZh}` : "";
            defText.textContent = [en, zh].filter(Boolean).join("\n\n");
          } else {
            defText.textContent = "";
          }
          hintText.innerHTML = `<span>再点一次进入下一题。</span> <span class="kbd">Space</span>/<span class="kbd">Enter</span>`;
        } else {
          defText.style.display = "none";
          defText.textContent = "";
          hintText.innerHTML = `<span>提示：再点一次就会显示解释。</span> <span class="kbd">Space</span>/<span class="kbd">Enter</span>`;
        }
      }

      function pickOne(){
        if (!noRepeat){
          return TERMS[Math.floor(Math.random() * TERMS.length)];
        }
        if (pool.length === 0) resetPool();
        const item = pool.pop();
        poolCount.textContent = String(pool.length);
        return item;
      }

      async function rollAndStop(){
        rolling = true;
        mainBtn.disabled = true;
        peekBtn.disabled = true;
        shuffleBtn.disabled = true;
        toggleNoRepeatBtn.disabled = true;
        resetBtn.disabled = true;

        termText.classList.add("roll");
        defText.style.display = "none";

        const start = Date.now();
        const duration = 900;
        while (Date.now() - start < duration){
          const tmp = TERMS[Math.floor(Math.random() * TERMS.length)];
          setScreen({ term: tmp.term, topic: tmp.topic, item: null, showDef: false });
          await new Promise(r => setTimeout(r, 60));
        }

        current = pickOne();
        drawn += 1;
        drawnCount.textContent = String(drawn);
        setScreen({ term: current.term, topic: current.topic, item: current, showDef: false });
        phase = "reveal";
        setModeLabel();

        termText.classList.remove("roll");
        mainBtn.disabled = false;
        peekBtn.disabled = false;
        shuffleBtn.disabled = false;
        toggleNoRepeatBtn.disabled = false;
        resetBtn.disabled = false;
        rolling = false;
      }

      async function onMain(){
        if (rolling) return;
        if (phase === "draw"){
          await rollAndStop();
          return;
        }
        if (phase === "reveal"){
          if (!current) return;
          setScreen({ term: current.term, topic: current.topic, item: current, showDef: true });
          revealed += 1;
          revealedCount.textContent = String(revealed);
          phase = "next";
          setModeLabel();
          return;
        }
        // next
        current = null;
        phase = "draw";
        setModeLabel();
        setScreen({ term: "准备好了就点击右侧按钮", topic: "-", item: null, showDef: false });
      }

      function onPeek(){
        if (rolling) return;
        if (phase === "reveal" && current){
          setScreen({ term: current.term, topic: current.topic, item: current, showDef: true });
        }
      }

      function onShuffle(){
        resetPool();
        // 不改变当前题目，只重排未重复池
      }

      function onToggleNoRepeat(){
        noRepeat = !noRepeat;
        toggleNoRepeatBtn.textContent = `未重复池：${noRepeat ? "开启" : "关闭"}`;
        if (noRepeat) resetPool();
        poolCount.textContent = noRepeat ? String(pool.length) : "∞";
      }

      function onReset(){
        drawn = 0;
        revealed = 0;
        drawnCount.textContent = "0";
        revealedCount.textContent = "0";
        current = null;
        phase = "draw";
        setModeLabel();
        setScreen({ term: "准备好了就点击右侧按钮", topic: "-", item: null, showDef: false });
        if (noRepeat) resetPool();
        poolCount.textContent = noRepeat ? String(pool.length) : "∞";
      }

      // init
      resetPool();
      poolCount.textContent = noRepeat ? String(pool.length) : "∞";
      toggleNoRepeatBtn.textContent = "未重复池：开启";
      setModeLabel();
      topicLabel.textContent = "-";

      mainBtn.addEventListener("click", onMain);
      document.querySelector(".screen").addEventListener("click", onMain);
      peekBtn.addEventListener("click", onPeek);
      shuffleBtn.addEventListener("click", onShuffle);
      toggleNoRepeatBtn.addEventListener("click", onToggleNoRepeat);
      resetBtn.addEventListener("click", onReset);

      document.addEventListener("keydown", (e) => {
        if (e.key === " " || e.key === "Enter"){
          e.preventDefault();
          onMain();
        }
      });
    </script>
  </body>
</html>
